# .github/workflows/deploy.yml
# ─── Deploy Astro site to GitHub Pages ─────────────────────────────────────
#
# Triggered automatically on every push to the `main` branch.
# Also runnable manually from the Actions tab (workflow_dispatch).
#
# ⚠️  ONE-TIME SETUP (do this before the first push):
#   1. Go to your repo → Settings → Pages
#   2. Under "Build and deployment" → Source → select "GitHub Actions"
#   That's it — no other configuration needed.
#
# Official Astro deploy guide: https://docs.astro.build/en/guides/deploy/github/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment runs at a time; queues new ones, doesn't cancel
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ── Job 1: Build the Astro site ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm            # caches node_modules between runs for speed

      - name: Configure GitHub Pages
        # Sets the correct base URL so Astro's site/base config matches Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci             # clean install from package-lock.json

      - name: Build Astro
        run: npm run build      # outputs to dist/

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/           # Astro's default output directory

  # ── Job 2: Deploy the artifact to GitHub Pages ──────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
